<!DOCTYPE html>
<html lang="en">

<head>
    <title>Regestration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="">
        <h1>prepare your next trip with me</h1>
        <p>please take a moment to get in touch with</p>
        <div>
            <div>
                <label for="name">full name</label>
                <input type="text" id="name" name="name" required placeholder="rania">
            </div>
            <div>
                <label for="phone">phone number</label>
                <input type="number" id="phone" name="phone" required placeholder="112233333">
            </div>
            <div>
                <label for="email">email</label>
                <input type="email" id="email" name="email" required placeholder="rania@gmail.com">
            </div>
            <div>
                <label for="gender">Gender</label>
                <div>
                    <input type="radio" name="gender" id="gender" value="male">
                    <label for="male" class="inline-label">Male</label>
                </div>
                <div>
                    <input type="radio" name="gender" id="gender" value="female">
                    <label for="female" class="inline-label">Female</label>
                </div>
            </div>

            <div>
                <label for="date">Arriving date</label>
                <input type="date" name="date" id="date">
            </div>
            <div>
                <label for="date">Departure date</label>
                <input type="date" name="date" id="date">
            </div>
        </div>




    </form>
  

</body>

</html>
